openapi: 3.0.3
info:
  title: Saving Service API
  description: |
    API contract của saving-service, đồng bộ theo route, controller và validator hiện tại.
    Lưu ý: một số URL runtime dùng cùng pattern path cho nhiều mục đích khác nhau theo HTTP method
    (ví dụ `/api/saving/:value` và `/api/installment/:value`). File này mô tả đúng behavior hiện tại.
  version: 1.1.0

servers:
  - url: http://localhost:8083
    description: Saving service trực tiếp (default local)
  - url: http://localhost:5444
    description: Qua API Gateway (development)

tags:
  - name: Health
  - name: Saving Plans
  - name: Saving Installments
  - name: Installment Plans

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service hoạt động bình thường
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/saving:
    post:
      tags:
        - Saving Plans
      summary: Tạo kế hoạch tiết kiệm mới
      operationId: createSavingPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SavingPlanCreateRequest'
      responses:
        '201':
          description: Tạo kế hoạch thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavingPlanMessageResponse'
        '400':
          description: Dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/saving/all:
    get:
      tags:
        - Saving Plans
      summary: Lấy tất cả kế hoạch tiết kiệm
      operationId: getAllSavingPlans
      responses:
        '200':
          description: Danh sách tất cả kế hoạch
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SavingPlan'

  /api/saving/{id}:
    get:
      tags:
        - Saving Plans
      summary: Lấy danh sách kế hoạch tiết kiệm của một user
      description: |
        Runtime route hiện tại là `GET /api/saving/:user_id`.
        Trong operation này, path param `id` chính là `user_id`.
      operationId: getSavingPlansByUser
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
      responses:
        '200':
          description: Danh sách kế hoạch của user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SavingPlan'
    put:
      tags:
        - Saving Plans
      summary: Cập nhật thông tin kế hoạch tiết kiệm
      operationId: updateSavingPlan
      parameters:
        - name: id
          in: path
          required: true
          description: Saving plan ID
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SavingPlanUpdateRequest'
      responses:
        '200':
          description: Cập nhật kế hoạch thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavingPlanMessageResponse'
        '400':
          description: Dữ liệu không hợp lệ hoặc không có field hợp lệ để cập nhật
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '404':
          description: Không tìm thấy kế hoạch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageErrorResponse'
        '500':
          description: Tạo transaction thất bại khi kế hoạch vừa chuyển sang hoàn thành
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownstreamErrorResponse'
    delete:
      tags:
        - Saving Plans
      summary: Xóa kế hoạch tiết kiệm
      operationId: deleteSavingPlan
      parameters:
        - name: id
          in: path
          required: true
          description: Saving plan ID
          schema:
            type: integer
      responses:
        '200':
          description: Xóa kế hoạch thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleMessageResponse'
        '404':
          description: Không tìm thấy kế hoạch để xóa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageErrorResponse'

  /api/saving/{user_id}/stats:
    get:
      tags:
        - Saving Plans
      summary: Lấy thống kê saving plans của user
      operationId: getSavingStats
      parameters:
        - name: user_id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
      responses:
        '200':
          description: Thống kê tổng quan saving plans
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavingStats'

  /api/saving/{user_id}/top:
    get:
      tags:
        - Saving Plans
      summary: Lấy tối đa 3 saving plans có tiến độ cao nhất của user
      operationId: getTopSavingPlans
      parameters:
        - name: user_id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
      responses:
        '200':
          description: Top saving plans theo tiến độ
          content:
            application/json:
              schema:
                type: array
                maxItems: 3
                items:
                  $ref: '#/components/schemas/SavingPlan'

  /api/saving/{id}/history:
    get:
      tags:
        - Saving Plans
      summary: Lấy lịch sử tiến độ của kế hoạch tiết kiệm
      operationId: getSavingPlanHistory
      parameters:
        - name: id
          in: path
          required: true
          description: Saving plan ID
          schema:
            type: integer
      responses:
        '200':
          description: Danh sách các mốc tiến độ
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SavingProgressPoint'
        '404':
          description: Không tìm thấy kế hoạch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageErrorResponse'
        '500':
          description: Lỗi server nội bộ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorResponse'

  /api/saving/{id}/progress:
    put:
      tags:
        - Saving Plans
      summary: Cập nhật current_amount của kế hoạch tiết kiệm
      operationId: updateSavingPlanProgress
      parameters:
        - name: id
          in: path
          required: true
          description: Saving plan ID
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SavingProgressUpdateRequest'
      responses:
        '200':
          description: Cập nhật tiến độ thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavingPlanMessageResponse'
        '400':
          description: Dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '404':
          description: Không tìm thấy kế hoạch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageErrorResponse'
        '500':
          description: Tạo transaction thất bại khi kế hoạch vừa hoàn thành
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownstreamErrorResponse'

  /api/saving/{id}/complete:
    put:
      tags:
        - Saving Plans
      summary: Đánh dấu kế hoạch tiết kiệm là hoàn thành
      operationId: markSavingPlanCompleted
      parameters:
        - name: id
          in: path
          required: true
          description: Saving plan ID
          schema:
            type: integer
      responses:
        '200':
          description: Đánh dấu hoàn thành thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavingPlanMessageResponse'
        '400':
          description: Kế hoạch đã hoàn thành trước đó
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageErrorResponse'
        '404':
          description: Không tìm thấy kế hoạch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageErrorResponse'
        '500':
          description: Tạo transaction thất bại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownstreamErrorResponse'

  /api/saving/{saving_plan_id}/installments:
    post:
      tags:
        - Saving Installments
      summary: Thêm một khoản đóng góp vào saving plan
      operationId: addSavingInstallment
      parameters:
        - name: saving_plan_id
          in: path
          required: true
          description: Saving plan ID
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SavingInstallmentCreateRequest'
      responses:
        '201':
          description: Thêm khoản đóng góp thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavingInstallmentCreateResponse'
        '400':
          description: Dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '404':
          description: Không tìm thấy saving plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageErrorResponse'
        '500':
          description: Tạo transaction thất bại khi saving plan vừa hoàn thành
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownstreamErrorResponse'
    get:
      tags:
        - Saving Installments
      summary: Lấy danh sách khoản đóng góp của saving plan
      operationId: getSavingInstallmentsByPlan
      parameters:
        - name: saving_plan_id
          in: path
          required: true
          description: Saving plan ID
          schema:
            type: integer
      responses:
        '200':
          description: Danh sách khoản đóng góp, sắp xếp theo payment_date giảm dần
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SavingInstallment'

  /api/saving/installments/{id}:
    delete:
      tags:
        - Saving Installments
      summary: Xóa một khoản đóng góp của saving plan
      operationId: deleteSavingInstallment
      parameters:
        - name: id
          in: path
          required: true
          description: Saving installment ID
          schema:
            type: integer
      responses:
        '200':
          description: Xóa khoản đóng góp thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavingInstallmentDeleteResponse'
        '404':
          description: Không tìm thấy khoản đóng góp
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageErrorResponse'
        '500':
          description: Lỗi server nội bộ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorResponse'

  /api/installment:
    post:
      tags:
        - Installment Plans
      summary: Tạo khoản trả góp mới
      operationId: createInstallmentPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstallmentPlanCreateRequest'
      responses:
        '201':
          description: Tạo khoản trả góp thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallmentPlanMessageResponse'
        '400':
          description: Dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/installment/{id}:
    get:
      tags:
        - Installment Plans
      summary: Lấy danh sách khoản trả góp của một user
      description: |
        Runtime route hiện tại là `GET /api/installment/:user_id`.
        Trong operation này, path param `id` chính là `user_id`.
      operationId: getInstallmentPlansByUser
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
      responses:
        '200':
          description: Danh sách khoản trả góp của user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InstallmentPlan'
    delete:
      tags:
        - Installment Plans
      summary: Xóa khoản trả góp
      operationId: deleteInstallmentPlan
      parameters:
        - name: id
          in: path
          required: true
          description: Installment plan ID
          schema:
            type: integer
      responses:
        '200':
          description: Xóa khoản trả góp và lịch sử liên quan thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleMessageResponse'
        '404':
          description: Không tìm thấy khoản trả góp để xóa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageErrorResponse'

  /api/installment/detail/{id}:
    get:
      tags:
        - Installment Plans
      summary: Lấy chi tiết một khoản trả góp
      operationId: getInstallmentPlanById
      parameters:
        - name: id
          in: path
          required: true
          description: Installment plan ID
          schema:
            type: integer
      responses:
        '200':
          description: Chi tiết khoản trả góp
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallmentPlan'
        '404':
          description: Không tìm thấy khoản trả góp
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageErrorResponse'
        '500':
          description: Lỗi server nội bộ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorResponse'

  /api/installment/stats/{user_id}:
    get:
      tags:
        - Installment Plans
      summary: Lấy thống kê khoản trả góp của user
      operationId: getInstallmentStats
      parameters:
        - name: user_id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
      responses:
        '200':
          description: Thống kê tổng quan installment plans
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallmentStats'

  /api/installment/top/{user_id}:
    get:
      tags:
        - Installment Plans
      summary: Lấy tối đa 3 khoản trả góp có tiến độ cao nhất
      operationId: getTopInstallmentPlans
      parameters:
        - name: user_id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
      responses:
        '200':
          description: Top installment plans theo tiến độ
          content:
            application/json:
              schema:
                type: array
                maxItems: 3
                items:
                  $ref: '#/components/schemas/InstallmentPlan'

  /api/installment/history/{id}:
    get:
      tags:
        - Installment Plans
      summary: Lấy lịch sử thanh toán của khoản trả góp
      operationId: getInstallmentPaymentHistory
      parameters:
        - name: id
          in: path
          required: true
          description: Installment plan ID
          schema:
            type: integer
      responses:
        '200':
          description: Danh sách lịch sử thanh toán
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InstallmentHistoryPoint'
        '500':
          description: Lỗi server nội bộ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorResponse'

  /api/installment/payments/chart/{user_id}:
    get:
      tags:
        - Installment Plans
      summary: Lấy dữ liệu chart thanh toán trả góp theo ngày
      operationId: getInstallmentPaymentChart
      parameters:
        - name: user_id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
      responses:
        '200':
          description: Dữ liệu chart thanh toán
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InstallmentChartPoint'
        '500':
          description: Lỗi server nội bộ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorResponse'

  /api/installment/{id}/pay:
    patch:
      tags:
        - Installment Plans
      summary: Thanh toán kỳ tiếp theo của khoản trả góp
      operationId: payInstallmentPlan
      parameters:
        - name: id
          in: path
          required: true
          description: Installment plan ID
          schema:
            type: integer
      responses:
        '200':
          description: Thanh toán thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallmentPlanMessageResponse'
        '400':
          description: Khoản trả góp đã hoàn thành hoặc không thể thanh toán thêm
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageErrorResponse'
        '404':
          description: Không tìm thấy khoản trả góp
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageErrorResponse'
        '500':
          description: Tạo transaction thất bại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownstreamErrorResponse'

  /api/installment/{id}/update:
    patch:
      tags:
        - Installment Plans
      summary: Cập nhật thông tin khoản trả góp
      operationId: updateInstallmentPlan
      parameters:
        - name: id
          in: path
          required: true
          description: Installment plan ID
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstallmentPlanUpdateRequest'
      responses:
        '200':
          description: Cập nhật khoản trả góp thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallmentPlanMessageResponse'
        '400':
          description: Dữ liệu không hợp lệ hoặc không có field hợp lệ để cập nhật
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '404':
          description: Không tìm thấy khoản trả góp
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageErrorResponse'

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
      required:
        - status

    SavingPlan:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 7
        title:
          type: string
          example: Mua laptop
        target_amount:
          type: number
          example: 30000000
        current_amount:
          type: number
          example: 5000000
        start_date:
          type: string
          format: date
          example: '2026-04-01'
        end_date:
          type: string
          format: date
          example: '2026-12-31'
        completed:
          type: boolean
          example: false
        progress_percentage:
          type: number
          example: 16.67
        created_at:
          type: string
          example: '2026-04-18T03:10:00.000Z'
        updated_at:
          type: string
          example: '2026-04-18T03:10:00.000Z'

    SavingPlanCreateRequest:
      type: object
      required:
        - user_id
        - title
        - target_amount
        - start_date
        - end_date
      properties:
        user_id:
          type: integer
          minimum: 1
        title:
          type: string
        target_amount:
          type: number
          exclusiveMinimum: 0
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date

    SavingPlanUpdateRequest:
      type: object
      description: |
        Partial update. Chỉ chấp nhận `title`, `target_amount`, `start_date`, `end_date`.
        Không được gửi `current_amount`, `completed`, `progress_percentage`.
      properties:
        title:
          type: string
        target_amount:
          type: number
          exclusiveMinimum: 0
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date

    SavingProgressUpdateRequest:
      type: object
      required:
        - current_amount
      properties:
        current_amount:
          type: number
          minimum: 0

    SavingStats:
      type: object
      properties:
        total_plans:
          type: integer
          example: 3
        completed:
          type: integer
          example: 1
        total_saving:
          type: number
          example: 12500000
        avg_progress:
          type: number
          example: 41.67
      required:
        - total_plans
        - completed
        - total_saving
        - avg_progress

    SavingProgressPoint:
      type: object
      properties:
        date:
          type: string
          example: '2026-04-18'
        progress:
          type: number
          example: 33.33
      required:
        - date
        - progress

    SavingInstallment:
      type: object
      properties:
        id:
          type: integer
          example: 12
        saving_plan_id:
          type: integer
          example: 1
        amount:
          type: number
          example: 1000000
        note:
          type: string
          nullable: true
          example: Đóng góp tháng 4
        payment_date:
          type: string
          example: '2026-04-18 10:00:00'
        created_at:
          type: string
          example: '2026-04-18T03:10:00.000Z'
        updated_at:
          type: string
          example: '2026-04-18T03:10:00.000Z'

    SavingInstallmentCreateRequest:
      type: object
      required:
        - amount
      properties:
        amount:
          type: number
          exclusiveMinimum: 0
        note:
          type: string
          description: Ghi chú tự do
        payment_date:
          type: string
          description: |
            Ngày hợp lệ. Code hiện chấp nhận `YYYY-MM-DD`, ISO datetime,
            hoặc chuỗi datetime parse được bởi JavaScript Date.
          example: '2026-04-18T10:00:00.000Z'

    SavingInstallmentCreateResponse:
      type: object
      properties:
        message:
          type: string
          example: Đã thêm khoản trả góp
        installment:
          $ref: '#/components/schemas/SavingInstallment'
        new_progress:
          type: number
          example: 33.33
      required:
        - message
        - installment
        - new_progress

    SavingInstallmentDeleteResponse:
      type: object
      properties:
        message:
          type: string
          example: Đã xóa khoản trả góp
        new_progress:
          type: number
          example: 20
      required:
        - message
        - new_progress

    InstallmentPlan:
      type: object
      properties:
        id:
          type: integer
          example: 3
        user_id:
          type: integer
          example: 7
        title:
          type: string
          example: Trả góp điện thoại
        total_amount:
