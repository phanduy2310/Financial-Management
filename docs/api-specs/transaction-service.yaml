openapi: 3.0.3
info:
  title: Transaction Service API
  description: |
    Finance Context — ghi nhận thu chi cá nhân, thống kê tài chính, quản lý ngân sách.
  version: 1.0.0

servers:
  - url: http://localhost:5444
    description: Qua API Gateway (development)

paths:
  /health:
    get:
      summary: Health check (gateway)
      operationId: healthCheck
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/transactions:
    post:
      summary: Tạo giao dịch mới
      operationId: createTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionCreate'
      responses:
        '200':
          description: Tạo thành công
        '400':
          description: Dữ liệu không hợp lệ

  /api/transactions/{user_id}:
    get:
      summary: Lấy danh sách giao dịch của user
      operationId: listTransactions
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Danh sách giao dịch — trả về {message, data:[...]}
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/transactions/detail/{id}:
    get:
      summary: Chi tiết một giao dịch
      operationId: getTransactionDetail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Chi tiết giao dịch
        '404':
          description: Không tìm thấy

  /api/transactions/{id}:
    put:
      summary: Cập nhật giao dịch
      operationId: updateTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionCreate'
      responses:
        '200':
          description: Cập nhật thành công
        '404':
          description: Không tìm thấy
    delete:
      summary: Xoá giao dịch
      operationId: deleteTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Đã xoá

  /api/transactions/stats:
    post:
      summary: Thống kê theo tháng
      operationId: getStatsByMonth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: integer
                month:
                  type: integer
                year:
                  type: integer
      responses:
        '200':
          description: Thống kê theo tháng

  /api/transactions/stats/category/{userId}:
    get:
      summary: Thống kê theo danh mục
      operationId: getStatsByCategory
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Thống kê theo danh mục

  /api/transactions/stats/summary/{userId}:
    get:
      summary: Tổng quan thu/chi/số dư
      operationId: getSummaryStats
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Tổng quan tài chính

  /api/transactions/stats/year/{userId}/{year}:
    get:
      summary: Thống kê theo năm
      operationId: getStatsByYear
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: year
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Thống kê theo năm

  /api/transactions/stats/range:
    post:
      summary: Thống kê theo khoảng thời gian
      operationId: getStatsByRange
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: integer
                from:
                  type: string
                  format: date
                to:
                  type: string
                  format: date
      responses:
        '200':
          description: Thống kê theo khoảng thời gian

  /api/budget:
    post:
      summary: Tạo ngân sách mới
      operationId: createBudget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetCreate'
      responses:
        '200':
          description: Tạo thành công
        '400':
          description: Dữ liệu không hợp lệ

  /api/budget/{userId}:
    get:
      summary: Lấy ngân sách của user
      operationId: getBudgetByUser
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Danh sách ngân sách — trả về {message, data:[...]}

  /api/budget/detail/{id}:
    get:
      summary: Chi tiết ngân sách
      operationId: getBudgetDetail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Chi tiết ngân sách

  /api/budget/{id}:
    patch:
      summary: Cập nhật ngân sách
      operationId: updateBudget
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetCreate'
      responses:
        '200':
          description: Cập nhật thành công
    delete:
      summary: Xoá ngân sách
      operationId: deleteBudget
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Đã xoá

  /api/budget/{id}/progress:
    patch:
      summary: Cập nhật tiến độ ngân sách
      operationId: updateBudgetProgress
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Cập nhật thành công

  /api/budget/{id}/complete:
    patch:
      summary: Đánh dấu ngân sách hoàn thành
      operationId: completeBudget
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Đánh dấu thành công

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    SuccessResponse:
      type: object
      description: Wrapper response dùng bởi helper success(res, data, message)
      properties:
        message:
          type: string
        data:
          description: Payload — array hoặc object tuỳ endpoint

    Transaction:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        type:
          type: string
          enum: [income, expense]
        amount:
          type: number
        category:
          type: string
        note:
          type: string
        date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time

    TransactionCreate:
      type: object
      required: [user_id, type, amount, category]
      properties:
        user_id:
          type: integer
        type:
          type: string
          enum: [income, expense]
        amount:
          type: number
          minimum: 1
        category:
          type: string
        note:
          type: string
        date:
          type: string
          format: date

    BudgetCreate:
      type: object
      required: [user_id, category, limit_amount]
      properties:
        user_id:
          type: integer
        category:
          type: string
        limit_amount:
          type: number
          minimum: 1
        month:
          type: integer
        year:
          type: integer
