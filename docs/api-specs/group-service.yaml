openapi: 3.0.3
info:
  title: Group Service API
  description: Quản lý chi tiêu cho nhóm, thành viên và giao dịch nhóm.
  version: 1.0.0

servers:
  - url: http://localhost:5002
    description: Local development

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          description: Payload tuỳ endpoint

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        code:
          type: string

    Group:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        owner_id:
          type: integer
        member_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    GroupMember:
      type: object
      properties:
        id:
          type: integer
        group_id:
          type: integer
        user_id:
          type: integer
        fullname:
          type: string
          nullable: true
        role:
          type: string
          enum: [owner, member]
        created_at:
          type: string
          format: date-time

    GroupTransaction:
      type: object
      properties:
        id:
          type: integer
        group_id:
          type: integer
        user_id:
          type: integer
        type:
          type: string
          enum: [income, expense]
        category:
          type: string
        amount:
          type: number
        note:
          type: string
          nullable: true
        date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time

    GroupTransactionShare:
      type: object
      properties:
        id:
          type: integer
        transaction_id:
          type: integer
        user_id:
          type: integer
        amount:
          type: number
        user:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            fullname:
              type: string

    GroupSummary:
      type: object
      properties:
        group_id:
          type: integer
        total_income:
          type: number
        total_expense:
          type: number
        closing_balance:
          type: number

security:
  - bearerAuth: []

paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # ─── Groups ───────────────────────────────────────
  /api/groups:
    post:
      summary: Tạo nhóm mới
      operationId: createGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                  nullable: true
      responses:
        '201':
          description: Tạo nhóm thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Thiếu tên nhóm

  /api/groups/my-groups:
    get:
      summary: Lấy danh sách nhóm của user hiện tại
      operationId: getMyGroups
      responses:
        '200':
          description: Danh sách nhóm
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Group'

  /api/groups/{id}:
    patch:
      summary: Cập nhật thông tin nhóm (chỉ owner)
      operationId: updateGroup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Cập nhật thành công
        '400':
          description: Không có thông tin cần cập nhật
        '403':
          description: Không có quyền
        '404':
          description: Không tìm thấy nhóm

    delete:
      summary: Xóa nhóm (chỉ owner)
      operationId: deleteGroup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Xóa thành công
        '403':
          description: Không có quyền
        '404':
          description: Không tìm thấy nhóm

  # ─── Members ──────────────────────────────────────
  /api/groups/{group_id}/members:
    get:
      summary: Lấy danh sách thành viên
      operationId: getAllMembers
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Danh sách thành viên kèm fullname
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/GroupMember'

    post:
      summary: Thêm thành viên vào nhóm (chỉ owner)
      operationId: addMember
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: integer
                role:
                  type: string
                  enum: [member]
                  default: member
      responses:
        '201':
          description: Thêm thành viên thành công
        '403':
          description: Không có quyền
        '404':
          description: Không tìm thấy nhóm
        '409':
          description: Người dùng đã là thành viên

  /api/groups/{group_id}/members/{user_id}:
    delete:
      summary: Xóa thành viên hoặc tự rời nhóm
      operationId: removeMember
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: integer
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Xóa/rời nhóm thành công
        '400':
          description: Owner không thể tự rời nhóm
        '403':
          description: Không có quyền
        '404':
          description: Thành viên không tồn tại

  # ─── Group Transactions ───────────────────────────
  /api/groups/{group_id}/transactions:
    get:
      summary: Lấy danh sách giao dịch của nhóm
      operationId: getAllGroupTransactions
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Danh sách giao dịch
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/GroupTransaction'
        '403':
          description: Không phải thành viên nhóm

    post:
      summary: Tạo giao dịch nhóm
      operationId: createGroupTransaction
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, category, amount, date]
              properties:
                type:
                  type: string
                  enum: [income, expense]
                category:
                  type: string
                amount:
                  type: number
                  minimum: 0.01
                date:
                  type: string
                  format: date
                note:
                  type: string
                  nullable: true
                shares:
                  type: array
                  items:
                    type: object
                    required: [user_id, amount]
                    properties:
                      user_id:
                        type: integer
                      amount:
                        type: number
      responses:
        '201':
          description: Tạo giao dịch thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          transaction_id:
                            type: integer
        '400':
          description: Dữ liệu không hợp lệ
        '403':
          description: Không phải thành viên nhóm

  /api/groups/{group_id}/transactions/summary:
    get:
      summary: Thống kê tổng thu/chi của nhóm
      operationId: getGroupSummary
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Thống kê nhóm
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/GroupSummary'
        '403':
          description: Không phải thành viên nhóm

  /api/groups/{group_id}/transactions/{transaction_id}:
    get:
      summary: Chi tiết giao dịch nhóm kèm shares
      operationId: getGroupTransactionDetail
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: integer
        - name: transaction_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Chi tiết giao dịch và danh sách chia sẻ
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          transaction:
                            $ref: '#/components/schemas/GroupTransaction'
                          shares:
                            type: array
                            items:
                              $ref: '#/components/schemas/GroupTransactionShare'
        '403':
          description: Không phải thành viên nhóm
        '404':
          description: Không tìm thấy giao dịch
