services:
  # ===========================
  # MYSQL
  # ===========================
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - app-network

  # ===========================
  # AUTH SERVICE
  # ===========================
  auth-service:
    build: ./services/auth-service
    restart: always
    env_file:
      - ./services/auth-service/.env.dev
    command: sh -c "npx knex migrate:latest && node server.js"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ===========================
  # TRANSACTION SERVICE
  # ===========================
  transaction-service:
    build: ./services/transaction-service
    restart: always
    env_file:
      - ./services/transaction-service/.env.dev
    command: sh -c "npm run migrate:latest && node server.js"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ===========================
  # SAVING SERVICE
  # ===========================
  saving-service:
    build: ./services/saving-service
    restart: always
    env_file:
      - ./services/saving-service/.env.dev
    command: sh -c "npx knex migrate:latest && node server.js"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ===========================
  # NOTIFICATION SERVICE
  # ===========================
  notification-service:
    build: ./services/notification-service
    restart: always
    env_file:
      - ./services/notification-service/.env.dev
    command: sh -c "npx knex migrate:latest && node server.js"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ===========================
  # GROUP SERVICE
  # ===========================
  group-service:
    build: ./services/group-service
    restart: always
    env_file:
      - ./services/group-service/.env.dev
    command: sh -c "npm run migrate:latest && node server.js"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ===========================
  # API GATEWAY
  # ===========================
  gateway:
    build: ./gateway
    restart: always
    env_file:
      - ./gateway/.env
    ports:
      - "${GATEWAY_PORT:-5444}:5444"
    depends_on:
      auth-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
      saving-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      group-service:
        condition: service_healthy
    networks:
      - app-network

  # ===========================
  # FRONTEND
  # ===========================
  frontend:
    build: ./frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-5000}:3000"
    depends_on:
      - gateway
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data:
